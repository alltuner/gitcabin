# Local-dev compose: container runs uvicorn unprivileged on port 8000;
# Docker Desktop publishes that to the host on port 80 (which is what gh
# expects for github.localhost). Source is bind-mounted so uvicorn --reload
# inside the container picks up edits made on the host.

services:
  testgit:
    build: .
    container_name: testgit
    ports:
      # host:container. Port 80 on the host needs Docker to grant it; on
      # macOS Docker Desktop's vmnetd handles that without `sudo docker`.
      - "80:8000"
    volumes:
      # Bind only src/. The image already has the venv + installed package
      # at /app/.venv; we don't want the host overlaying those.
      - ./src:/app/src
    environment:
      # macOS bind mounts go through Docker Desktop's VirtioFS, which mostly
      # propagates inotify events but isn't perfect. Polling adds CPU but is
      # the simplest way to guarantee reload works for the dev loop.
      WATCHFILES_FORCE_POLLING: "true"
    restart: unless-stopped
