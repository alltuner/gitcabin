# Local-dev compose: one service, one host port. The container runs the
# combined ASGI app (gitcabin.combined:create_app) which dispatches by Host
# header — `Host: api.github.localhost` (cab + gh traffic) hits the REST +
# GraphQL API; everything else (browsers) hits the HTML dashboard. No
# privileged ports anywhere; cab forwards via HTTP_PROXY to 8080.
#
# Use `docker compose watch` for the dev loop — Compose syncs source into
# the container and restarts granian on every edit. Plain `docker compose up`
# is fine for "I just want to run it" without live reload.

name: gitcabin

services:
  gitcabin:
    build: .
    container_name: gitcabin
    command:
      - "uv"
      - "run"
      - "--no-dev"
      - "granian"
      - "--interface"
      - "asgi"
      - "--factory"
      # --access-log surfaces every request in `docker compose logs` so dev
      # iteration (and prod debugging) doesn't have to guess what's hitting
      # the box. Granian's default is off; we always want it on here.
      - "--access-log"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "gitcabin.combined:create_app"
    ports:
      # 127.0.0.1-bound on purpose: keeps gitcabin off the LAN. cab points
      # HTTP_PROXY here for gh traffic; browsers reach the dashboard at
      # http://localhost:18080/. One port covers both because the combined
      # app routes by Host header. 18080 (rather than the more common 8080)
      # to avoid colliding with the long tail of dev-tool defaults.
      - "127.0.0.1:18080:8000"
    volumes:
      # Bare repos (code + metadata refs) live here. Host bind mount on
      # purpose: David can `cd ./data/repos/owner/name.git && git log` to
      # inspect state with native tooling. Excluded from git via .gitignore.
      - ./data:/app/data
    restart: unless-stopped
    develop:
      watch:
        # Python source edits sync into /app/src and restart the service.
        # The bundled dist/ subdirectory is excluded here (handled by the
        # next rule) so changes to a hashed CSS/JS file don't pointlessly
        # restart granian — the asset manifest is re-read per request.
        - action: sync+restart
          path: ./src
          target: /app/src
          ignore:
            - src/gitcabin/web/static/dist/
        # Bundler output: hot-swap into the running container without a
        # restart. Run `bun run --cwd web-src watch` on the host to keep
        # this directory current; granian picks up the new manifest on the
        # next request automatically.
        - action: sync
          path: ./src/gitcabin/web/static/dist
          target: /app/src/gitcabin/web/static/dist
        # Anything that changes the dependency graph or the image itself
        # forces a full rebuild — uv sync + bun build run during image build.
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./web-src/package.json
        - action: rebuild
          path: ./web-src/bun.lock
