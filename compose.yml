# Local-dev compose: container runs granian unprivileged on port 8000;
# Docker Desktop publishes that to the host on port 80 (which is what gh
# expects for github.localhost).
#
# Use `docker compose watch` for the dev loop — Compose syncs source into
# the container and restarts granian on every edit. Plain `docker compose up`
# is fine for "I just want to run it" without live reload.

services:
  testgit:
    build: .
    container_name: testgit
    ports:
      # host:container. Port 80 on the host needs Docker to grant it; on
      # macOS Docker Desktop's vmnetd handles that without `sudo docker`.
      - "80:8000"
    volumes:
      # Bare repos (code + metadata refs) live here. Host bind mount on
      # purpose: David can `cd ./data/repos/owner/name.git && git log` to
      # inspect state with native tooling. Excluded from git via .gitignore.
      - ./data:/app/data
    restart: unless-stopped
    develop:
      watch:
        # Source edits sync into /app/src and restart the service. Cheaper
        # than a rebuild and matches granian's restart-on-import-change story.
        - action: sync+restart
          path: ./src
          target: /app/src
        # Anything that changes the dependency graph or the image itself
        # forces a full rebuild — uv sync runs as part of the image build.
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./Dockerfile

  # cgit is a read-only browser for the bare repos under ./data/repos.
  # Useful for visually inspecting refs/issues/local/* (and later refs/prs/*)
  # while building the rest of the system. Reads only — never writes.
  cgit:
    build: ./cgit
    container_name: testgit-cgit
    ports:
      # Browse at http://localhost:8080/cgit/ once the stack is up.
      - "8080:80"
    volumes:
      # Read-only mount: cgit is a viewer, not a writer.
      - ./data/repos:/repos:ro
    restart: unless-stopped
