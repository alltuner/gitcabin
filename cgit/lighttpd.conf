# Self-contained lighttpd config for cgit. Replaces Debian's default
# (which pulls in conf-enabled/* and fastcgi/compress modules we don't
# need) so the image stays minimal and the routing is auditable in one file.

server.modules = (
    "mod_alias",
    "mod_cgi",
    "mod_rewrite",
)

server.port = 80
server.document-root = "/usr/share/cgit"

# Logs to docker's stdout/stderr.
server.errorlog = "/dev/stderr"
accesslog.filename = "/dev/stdout"
server.modules += ("mod_accesslog",)

mimetype.assign = (
    ".css" => "text/css",
    ".png" => "image/png",
    ".ico" => "image/x-icon",
    ".svg" => "image/svg+xml",
    ".html" => "text/html",
)

# /cgit-css/* serves the static assets cgit ships (cgit.css, cgit.png) from
# /usr/share/cgit/. /cgit.cgi maps to the binary, which lives outside the
# document root.
alias.url = (
    "/cgit-css/" => "/usr/share/cgit/",
    "/cgit.cgi"  => "/usr/lib/cgit/cgit.cgi",
)

# Everything that isn't a static asset or the cgit binary itself becomes
# a path inside cgit (so the URL bar reads `http://host/octocat/hello/log`,
# not `.../cgit.cgi/octocat/hello/log`).
url.rewrite-once = (
    "^/cgit-css/.*$"        => "$0",
    "^/cgit\.cgi(/.*)?$"    => "$0",
    "^/$"                   => "/cgit.cgi/",
    "^/(.*)$"               => "/cgit.cgi/$1",
)

cgi.assign = ( "/cgit.cgi" => "" )

# cgit reads its config path from the CGIT_CONFIG env var when set.
setenv.add-environment = (
    "CGIT_CONFIG" => "/etc/cgitrc",
)
