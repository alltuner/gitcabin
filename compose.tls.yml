# Overlay that adds a Caddy sidecar terminating TLS on 127.0.0.1:443 with a
# per-machine local CA. Used together with the default compose.yml:
#
#   docker compose -f compose.yml -f compose.tls.yml up -d
#   bash scripts/trust.sh    # one-time, installs Caddy's CA into the OS keychain
#   gh auth login --hostname mycabin.gitcabin.localhost --with-token <<< any-token
#
# The user can pick any subdomain of gitcabin.localhost (it resolves to
# 127.0.0.1 natively, no /etc/hosts edits). The Caddy CA's private key is
# generated once on first start and never leaves this machine, so a DNS hijack
# of any public domain we control would not produce a cert this install trusts.

services:
  caddy:
    image: caddy:2-alpine
    container_name: gitcabin-caddy
    restart: unless-stopped
    ports:
      # 127.0.0.1-bound on purpose: the cert is for *.gitcabin.localhost, which
      # only resolves on this machine. Exposing it to the LAN would do nothing
      # useful and fail validation anyway.
      - "127.0.0.1:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Persistent volumes for Caddy's CA + leaf certs. The CA's root.crt is
      # the file scripts/trust.sh extracts and installs into the OS keychain.
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - gitcabin

  # The API container's host port mapping is removed — Caddy is now the only
  # ingress for the API in this overlay. gitcabin is reachable on the Docker
  # network at gitcabin:8000 (which Caddy proxies to).
  gitcabin:
    ports: !reset []

volumes:
  caddy-data:
  caddy-config:
