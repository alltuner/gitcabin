{# ABOUTME: Header breadcrumb for every repo page — owner / name.
   ABOUTME: Both segments are always links (owner → owner page, name →
   ABOUTME: repo overview). The repo-name link works as a "back to repo
   ABOUTME: home" affordance from any deeper view. #}
<nav class="flex min-w-0 flex-wrap items-center gap-x-2">
  <a href="{{ url_for('owner', owner=owner).path }}" class="truncate text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100">{{ owner }}</a>
  <span class="text-gray-300 dark:text-gray-600">/</span>
  <a href="{{ url_for('repo', owner=owner, name=name).path }}" class="truncate text-gray-900 dark:text-gray-100 hover:text-blue-600 dark:hover:text-blue-400">{{ name }}</a>
</nav>
