{# ABOUTME: Base layout — Tailwind via CDN, GitHub-shaped header. #}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}gitcabin{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'media',
    theme: {
      extend: {
        fontFamily: {
          sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', 'Arial', 'sans-serif'],
          mono: ['ui-monospace', 'SFMono-Regular', '"SF Mono"', 'Menlo', 'Consolas', 'monospace'],
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="/static/style.css">
{% block head_extra %}{% endblock %}
</head>
<body class="bg-white text-gray-900 antialiased dark:bg-gray-950 dark:text-gray-100 font-sans">
<header class="border-b border-gray-200 bg-gray-50 dark:border-gray-800 dark:bg-gray-900">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
    <a href="/" class="flex items-center gap-2 font-semibold text-gray-900 dark:text-gray-100 hover:no-underline">
      <svg viewBox="0 0 16 16" class="h-5 w-5" aria-hidden="true" fill="currentColor">
        {# Custom logo: a git-graph glyph — main-line commit at top and bottom,
           a branch node off to the right, connected by paths. Reads as
           "branch + merge" without leaning on any existing service's mark. #}
        <circle cx="4" cy="3" r="1.5"/>
        <circle cx="4" cy="13" r="1.5"/>
        <circle cx="12" cy="8" r="1.5"/>
        <path d="M4 4.5v7" stroke="currentColor" stroke-width="1.25" fill="none"/>
        <path d="M4 8h6.5" stroke="currentColor" stroke-width="1.25" fill="none"/>
      </svg>
      gitcabin
    </a>
  </div>
</header>
<main class="mx-auto max-w-6xl px-4 py-6">
{% block content %}{% endblock %}
</main>
</body>
</html>
