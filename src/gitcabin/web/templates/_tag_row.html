{# ABOUTME: Tag row — name + tip commit metadata (no default badge, no date). Reads `ref`, `owner`, `name`. #}
<div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-900">
  <a href="{{ repo_url_prefix(owner, name) }}/tree/{{ ref.name }}" class="font-mono text-sm font-semibold text-blue-600 hover:underline dark:text-blue-400">{{ ref.name }}</a>
  <div class="ml-auto text-xs text-gray-500 dark:text-gray-400">
    <a href="{{ repo_url_prefix(owner, name) }}/commit/{{ ref.target_sha }}" class="font-mono text-blue-600 hover:underline dark:text-blue-400" title="{{ ref.target_sha }}">{{ ref.target_short_sha }}</a>
    <span class="mx-1">·</span>
    {{ ref.target_subject }}
  </div>
</div>
