{# ABOUTME: Repo card row — shown in the owner page repo list. Reads `owner` (login string) and `repo`. #}
<a href="/{{ owner }}/{{ repo.name }}" class="block px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-900">
  <div class="font-semibold text-blue-600 dark:text-blue-400">{{ repo.name }}</div>
  {% if repo.description %}
  <div class="mt-1 text-sm text-gray-600 dark:text-gray-300">{{ repo.description }}</div>
  {% endif %}
  <div class="mt-1 text-xs text-gray-500 dark:text-gray-400">
    pushed
    <time datetime="{{ repo.pushed_at }}" title="{{ repo.pushed_at }}">{{ repo.pushed_at | relative_time }}</time>
  </div>
</a>
