{# ABOUTME: Branch row — name + default badge + tip commit metadata. Reads `ref`, `owner`, `name`, `default_branch`. #}
<div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-900">
  <a href="/{{ owner }}/{{ name }}/tree/{{ ref.name }}" class="font-mono text-sm font-semibold text-blue-600 hover:underline dark:text-blue-400">{{ ref.name }}</a>
  {% if ref.name == default_branch %}
  <span class="rounded-full bg-blue-100 px-2 py-0.5 text-xs font-medium text-blue-800 dark:bg-blue-900 dark:text-blue-200">default</span>
  {% endif %}
  <div class="ml-auto text-xs text-gray-500 dark:text-gray-400">
    <a href="/{{ owner }}/{{ name }}/commit/{{ ref.target_sha }}" class="font-mono text-blue-600 hover:underline dark:text-blue-400">{{ ref.target_short_sha }}</a>
    <span class="mx-1">·</span>
    {{ ref.target_subject }}
    <span class="mx-1">·</span>
    {{ ref.target_authored_at[:10] }}
  </div>
</div>
